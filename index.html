// ============ LOCAL STORAGE WRAPPER ============
const storageGet = (key) => {
  try {
    const v = localStorage.getItem(key);
    return v ? { key, value: v } : null;
  } catch { return null; }
};
const storageSet = (key, value) => {
  try { localStorage.setItem(key, value); return { key, value }; } catch { return null; }
};
const storageDelete = (key) => {
  try { localStorage.removeItem(key); return { key, deleted: true }; } catch { return null; }
};

// ============ SOUND ENGINE ============
class SoundEngine {
  constructor() { this.ctx = null; this.muted = false; this.musicNodes = []; }
  init() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }
  toggle() { this.muted = !this.muted; if (this.muted) this.stopMusic(); return this.muted; }
  tone(freq, duration, type = 'square', volume = 0.15, delay = 0) {
    if (!this.ctx || this.muted) return;
    const now = this.ctx.currentTime + delay;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(volume, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(now); osc.stop(now + duration);
  }
  sweep(s, e, d, type = 'sawtooth', v = 0.15) {
    if (!this.ctx || this.muted) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(s, now);
    osc.frequency.exponentialRampToValueAtTime(e, now + d);
    gain.gain.setValueAtTime(v, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + d);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(now); osc.stop(now + d);
  }
  noise(d, v = 0.1, f = 1000) {
    if (!this.ctx || this.muted) return;
    const now = this.ctx.currentTime;
    const bs = this.ctx.sampleRate * d;
    const buf = this.ctx.createBuffer(1, bs, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0; i<bs; i++) data[i] = Math.random()*2-1;
    const n = this.ctx.createBufferSource(); n.buffer = buf;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.setValueAtTime(f, now);
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(v, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + d);
    n.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
    n.start(now); n.stop(now + d);
  }
  playClick() { this.tone(600, 0.05, 'square', 0.08); }
  playSelect() { this.tone(523, 0.08, 'square', 0.1); this.tone(784, 0.08, 'square', 0.1, 0.08); }
  playHit() { this.sweep(800, 200, 0.15, 'sawtooth', 0.2); this.noise(0.1, 0.15, 2000); }
  playCrit() {
    this.tone(880, 0.08, 'square', 0.18);
    this.tone(1174, 0.08, 'square', 0.18, 0.08);
    this.tone(1568, 0.15, 'square', 0.2, 0.16);
    this.noise(0.1, 0.1, 3000);
  }
  playDamage() { this.sweep(300, 80, 0.3, 'sawtooth', 0.2); this.noise(0.2, 0.2, 400); }
  playCorrect() { this.tone(659, 0.1, 'square', 0.12); this.tone(988, 0.15, 'square', 0.12, 0.1); }
  playWrong() { this.tone(200, 0.1, 'sawtooth', 0.15); this.tone(150, 0.2, 'sawtooth', 0.15, 0.1); }
  playVictory() { [523,659,784,1047].forEach((n,i) => this.tone(n, 0.2, 'square', 0.15, i*0.12)); }
  playDefeat() { [440,392,349,294,220].forEach((n,i) => this.tone(n, 0.3, 'triangle', 0.15, i*0.2)); }
  playBossVictory() {
    [523,659,784,1047,1319,1568].forEach((n,i) => this.tone(n, 0.15, 'square', 0.18, i*0.1));
    this.tone(523, 0.6, 'square', 0.15, 0.6);
    this.tone(659, 0.6, 'square', 0.15, 0.6);
    this.tone(784, 0.6, 'square', 0.15, 0.6);
  }
  playLevelUp() { [392,523,659,784,1047].forEach((n,i) => this.tone(n, 0.12, 'square', 0.15, i*0.08)); }
  playPotion() { this.sweep(400, 1200, 0.3, 'sine', 0.15); this.tone(1400, 0.1, 'sine', 0.1, 0.25); }
  playTick() { this.tone(1200, 0.03, 'square', 0.06); }
  playBossAppear() { this.sweep(100, 50, 0.8, 'sawtooth', 0.25); this.noise(0.6, 0.15, 200); }
  startMusic(isBoss = false) {
    if (!this.ctx || this.muted) return;
    this.stopMusic();
    const notes = isBoss ? [110,146,110,165,110,146,98,130] : [146,174,220,174,146,130,110,130];
    const len = isBoss ? 0.35 : 0.4;
    const loop = () => {
      if (this.muted || !this.ctx) return;
      notes.forEach((f, i) => {
        this.tone(f, len*0.9, 'triangle', 0.05, i*len);
        if (i%2 === 0) this.tone(f*1.5, len*0.9, 'triangle', 0.03, i*len);
      });
    };
    loop();
    const interval = setInterval(loop, notes.length * len * 1000);
    this.musicNodes.push(interval);
  }
  stopMusic() { this.musicNodes.forEach(n => clearInterval(n)); this.musicNodes = []; }
}

const MONSTERS = {
  A1: [
    { name: 'Goblin of Gloom', emoji: '👺', hp: 2, color: '#8b7355' },
    { name: 'Slimey Syllable', emoji: '🟢', hp: 2, color: '#5ba85e' },
    { name: 'Tiny Troll', emoji: '👹', hp: 2, color: '#a0522d' },
  ],
  A2: [
    { name: 'Skeleton Scribe', emoji: '💀', hp: 3, color: '#d4d4d4' },
    { name: 'Shadow Sprite', emoji: '👻', hp: 3, color: '#9b6bcc' },
    { name: 'Rusty Rat', emoji: '🐀', hp: 3, color: '#7d5030' },
  ],
  B1: [
    { name: 'Phrasal Phantom', emoji: '🧟', hp: 3, color: '#4a7c59' },
    { name: 'Idiom Imp', emoji: '😈', hp: 3, color: '#c44545' },
    { name: 'Vocabulary Vampire', emoji: '🧛', hp: 4, color: '#5b0a0a' },
  ],
  B2: [
    { name: 'Nuance Naga', emoji: '🐍', hp: 4, color: '#2d7a3e' },
    { name: 'Collocation Cyclops', emoji: '👁️', hp: 4, color: '#8b4789' },
    { name: 'Semantic Specter', emoji: '👾', hp: 4, color: '#6b4ba8' },
  ],
  C1: [
    { name: 'Lexicon Lich', emoji: '🧙', hp: 5, color: '#1a4d6e' },
    { name: 'Etymology Eldritch', emoji: '🦇', hp: 5, color: '#2d1b4e' },
    { name: 'Paragon of Prose', emoji: '🐉', hp: 6, color: '#b8860b' },
  ],
};

const BOSSES = {
  A1: { name: 'The Word Wraith', emoji: '☠️', hp: 5 },
  A2: { name: 'Lord of Lost Letters', emoji: '👑', hp: 6 },
  B1: { name: 'The Grammarian', emoji: '🎭', hp: 7 },
  B2: { name: 'Duke of Diction', emoji: '🗿', hp: 8 },
  C1: { name: 'The Lexiarch', emoji: '⚔️', hp: 10 },
};

const LEVEL_NAMES = {
  A1: 'Crypt of Common Words',
  A2: 'Hall of Everyday Tongue',
  B1: 'Cavern of Phrasal Peril',
  B2: 'Tower of Nuance',
  C1: 'Sanctum of the Lexiarch',
};

const SAVE_KEY = 'lexicon-quest-save';
const STATS_KEY = 'lexicon-quest-stats';
const ROOMS_PER_LEVEL = 5;

function LexiconQuest() {
  const [screen, setScreen] = useState('loading');
  const [cefrLevel, setCefrLevel] = useState('A1');
  const [playerHP, setPlayerHP] = useState(10);
  const maxHP = 10;
  const [mana, setMana] = useState(3);
  const [xp, setXP] = useState(0);
  const [streak, setStreak] = useState(0);
  const [roomNumber, setRoomNumber] = useState(1);
  const [currentMonster, setCurrentMonster] = useState(null);
  const [currentQuestion, setCurrentQuestion] = useState(null);
  const [usedQuestions, setUsedQuestions] = useState([]);
  const [selectedOption, setSelectedOption] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [spellJournal, setSpellJournal] = useState([]);
  const [timeLeft, setTimeLeft] = useState(15);
  const [timerActive, setTimerActive] = useState(false);
  const [shake, setShake] = useState(false);
  const [playerAttack, setPlayerAttack] = useState(false);
  const [monsterAttack, setMonsterAttack] = useState(false);
  const [damageFlash, setDamageFlash] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const [criticalHit, setCriticalHit] = useState(false);
  const [muted, setMuted] = useState(false);
  const [hasSave, setHasSave] = useState(false);
  const [highestLevel, setHighestLevel] = useState('A1');
  const [totalLifetimeXP, setTotalLifetimeXP] = useState(0);
  const [saveNotice, setSaveNotice] = useState('');
  const timerRef = useRef(null);
  const soundRef = useRef(null);

  useEffect(() => {
    if (!soundRef.current) soundRef.current = new SoundEngine();
    loadSavedStats();
  }, []);

  const sfx = () => soundRef.current;

  const loadSavedStats = () => {
    try {
      const statsResult = storageGet(STATS_KEY);
      if (statsResult && statsResult.value) {
        const stats = JSON.parse(statsResult.value);
        setSpellJournal(stats.spellJournal || []);
        setHighestLevel(stats.highestLevel || 'A1');
        setTotalLifetimeXP(stats.totalLifetimeXP || 0);
      }
    } catch (e) {}
    const saveResult = storageGet(SAVE_KEY);
    if (saveResult && saveResult.value) setHasSave(true);
    setScreen('menu');
  };

  const saveStats = (newJournal, addedXP, currentCefr) => {
    try {
      const levels = ['A1','A2','B1','B2','C1'];
      const newHighest = levels.indexOf(currentCefr) > levels.indexOf(highestLevel) ? currentCefr : highestLevel;
      const newLifetimeXP = totalLifetimeXP + addedXP;
      setHighestLevel(newHighest);
      setTotalLifetimeXP(newLifetimeXP);
      storageSet(STATS_KEY, JSON.stringify({
        spellJournal: newJournal,
        highestLevel: newHighest,
        totalLifetimeXP: newLifetimeXP,
        lastPlayed: new Date().toISOString(),
      }));
    } catch (e) { console.error(e); }
  };

  const saveCurrentRun = () => {
    try {
      storageSet(SAVE_KEY, JSON.stringify({
        cefrLevel, playerHP, mana, xp, streak, roomNumber,
        usedQuestions, timestamp: new Date().toISOString(),
      }));
      setHasSave(true);
      showSaveNotice('💾 Progress saved');
    } catch (e) {}
  };

  const resumeGame = () => {
    const result = storageGet(SAVE_KEY);
    if (result && result.value) {
      const run = JSON.parse(result.value);
      setCefrLevel(run.cefrLevel);
      setPlayerHP(run.playerHP);
      setMana(run.mana);
      setXP(run.xp);
      setStreak(run.streak);
      setRoomNumber(run.roomNumber);
      setUsedQuestions(run.usedQuestions);
      sfx()?.init();
      sfx()?.playSelect();
      setTimeout(() => {
        startBattleWithLevel(run.cefrLevel, run.roomNumber > ROOMS_PER_LEVEL);
      }, 100);
    }
  };

  const clearSavedRun = () => { storageDelete(SAVE_KEY); setHasSave(false); };

  const resetAllProgress = () => {
    storageDelete(SAVE_KEY);
    storageDelete(STATS_KEY);
    setHasSave(false);
    setHighestLevel('A1');
    setTotalLifetimeXP(0);
    setSpellJournal([]);
    showSaveNotice('🗑️ All progress reset');
  };

  const showSaveNotice = (msg) => {
    setSaveNotice(msg);
    setTimeout(() => setSaveNotice(''), 2500);
  };

  const toggleMute = () => {
    const s = sfx();
    if (s) {
      const isMuted = s.toggle();
      setMuted(isMuted);
      if (!isMuted && screen === 'battle') s.startMusic(currentMonster?.isBoss);
    }
  };

  useEffect(() => {
    if (screen !== 'battle') return;
    if (timerActive && timeLeft <= 5 && timeLeft > 0 && !feedback) sfx()?.playTick();
  }, [timeLeft, timerActive, feedback, screen]);

  const startBattle = (isBoss = false) => startBattleWithLevel(cefrLevel, isBoss);

  const startBattleWithLevel = (level, isBoss = false) => {
    const pool = WORD_BANK[level].filter(q => !usedQuestions.includes(q.word));
    const qp = pool.length > 0 ? pool : WORD_BANK[level];
    const question = qp[Math.floor(Math.random() * qp.length)];
    const monster = isBoss
      ? { ...BOSSES[level] }
      : { ...MONSTERS[level][Math.floor(Math.random() * MONSTERS[level].length)] };
    monster.currentHP = monster.hp;
    monster.isBoss = isBoss;
    setCurrentMonster(monster);
    setCurrentQuestion(question);
    setSelectedOption(null);
    setFeedback(null);
    setShowHint(false);
    setTimeLeft(15);
    setTimerActive(true);
    setScreen('battle');
    if (isBoss) sfx()?.playBossAppear();
    sfx()?.startMusic(isBoss);
  };

  useEffect(() => {
    // Timer only ticks while we are ACTUALLY in a battle
    if (screen !== 'battle') return;
    if (timerActive && timeLeft > 0 && !feedback) {
      timerRef.current = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    } else if (timeLeft === 0 && !feedback) {
      handleAnswer(-1);
    }
    return () => clearTimeout(timerRef.current);
  }, [timeLeft, timerActive, feedback, screen]);

  const handleAnswer = (optionIdx) => {
    if (feedback) return;
    setTimerActive(false);
    setSelectedOption(optionIdx);
    const correct = optionIdx === currentQuestion.answer;
    const isCrit = correct && timeLeft >= 10;

    if (correct) {
      if (isCrit) sfx()?.playCrit(); else sfx()?.playHit();
      sfx()?.playCorrect();
      setPlayerAttack(true);
      setTimeout(() => setPlayerAttack(false), 500);
      setTimeout(() => setDamageFlash('monster'), 300);
      setTimeout(() => setDamageFlash(null), 600);
      const damage = isCrit ? 2 : 1;
      setCriticalHit(isCrit);
      const newMonsterHP = Math.max(0, currentMonster.currentHP - damage);
      setTimeout(() => setCurrentMonster(m => ({ ...m, currentHP: newMonsterHP })), 400);
      setStreak(s => s + 1);
      setXP(x => x + (isCrit ? 20 : 10) + (streak * 2));
      setFeedback('correct');
      let updatedJournal = spellJournal;
      if (!spellJournal.find(s => s.word === currentQuestion.word)) {
        updatedJournal = [...spellJournal, {
          word: currentQuestion.word, type: currentQuestion.type,
          answer: currentQuestion.options[currentQuestion.answer],
          hint: currentQuestion.hint, level: cefrLevel,
        }];
        setSpellJournal(updatedJournal);
      }
      setUsedQuestions(u => [...u, currentQuestion.word]);
      setTimeout(() => {
        if (newMonsterHP <= 0) handleMonsterDefeated();
        else setTimeout(() => nextQuestion(), 800);
      }, 1200);
    } else {
      sfx()?.playWrong();
      setTimeout(() => sfx()?.playDamage(), 200);
      setMonsterAttack(true);
      setTimeout(() => setMonsterAttack(false), 500);
      setShake(true);
      setTimeout(() => setShake(false), 500);
      setTimeout(() => setDamageFlash('player'), 300);
      setTimeout(() => setDamageFlash(null), 600);
      const damage = currentMonster.isBoss ? 3 : 2;
      const newHP = Math.max(0, playerHP - damage);
      setTimeout(() => setPlayerHP(newHP), 400);
      setStreak(0);
      setFeedback('wrong');
      setTimeout(() => {
        if (newHP <= 0) {
          sfx()?.stopMusic();
          sfx()?.playDefeat();
          setSpellJournal(latestJournal => { saveStats(latestJournal, xp, cefrLevel); return latestJournal; });
          clearSavedRun();
          setScreen('defeat');
        } else {
          setTimeout(() => nextQuestion(), 800);
        }
      }, 1200);
    }
  };

  const nextQuestion = () => {
    const pool = WORD_BANK[cefrLevel].filter(q => !usedQuestions.includes(q.word) && q.word !== currentQuestion.word);
    const qp = pool.length > 0 ? pool : WORD_BANK[cefrLevel].filter(q => q.word !== currentQuestion.word);
    const question = qp[Math.floor(Math.random() * qp.length)];
    setCurrentQuestion(question);
    setSelectedOption(null);
    setFeedback(null);
    setShowHint(false);
    setCriticalHit(false);
    setTimeLeft(15);
    setTimerActive(true);
  };

  const handleMonsterDefeated = () => {
    const bonusXP = currentMonster.isBoss ? 100 : 25;
    setXP(x => x + bonusXP);
    setPlayerHP(hp => Math.min(maxHP, hp + (currentMonster.isBoss ? 5 : 2)));
    setSpellJournal(latestJournal => { saveStats(latestJournal, bonusXP, cefrLevel); return latestJournal; });
    if (currentMonster.isBoss) {
      setMana(m => Math.min(5, m + 2));
      sfx()?.stopMusic();
      sfx()?.playBossVictory();
      clearSavedRun();
      setScreen('levelComplete');
    } else {
      setMana(m => Math.min(5, m + 1));
      sfx()?.stopMusic();
      sfx()?.playVictory();
      setTimeout(() => saveCurrentRun(), 100);
      setScreen('victory');
    }
  };

  const continueAdventure = () => {
    sfx()?.playSelect();
    const nextRoom = roomNumber + 1;
    setRoomNumber(nextRoom);
    startBattle(nextRoom > ROOMS_PER_LEVEL);
  };

  const advanceLevel = () => {
    sfx()?.playLevelUp();
    const levels = ['A1','A2','B1','B2','C1'];
    const i = levels.indexOf(cefrLevel);
    if (i < levels.length - 1) {
      setCefrLevel(levels[i+1]);
      setRoomNumber(1);
      setUsedQuestions([]);
      setPlayerHP(maxHP);
      setScreen('menu');
    } else setScreen('gameWon');
  };

  const useHintPotion = () => {
    if (mana > 0 && !showHint) {
      sfx()?.playPotion();
      setMana(m => m - 1);
      setShowHint(true);
    }
  };

  const resetGame = () => {
    // Stop the timer and music cleanly
    clearTimeout(timerRef.current);
    setTimerActive(false);
    setTimeLeft(15);
    setFeedback(null);
    sfx()?.stopMusic();
    sfx()?.playClick();
    setScreen('menu');
    setPlayerHP(maxHP);
    setMana(3); setXP(0); setStreak(0); setRoomNumber(1);
    setUsedQuestions([]);
    setCurrentMonster(null); setCurrentQuestion(null);
  };

  const startGame = (level) => {
    sfx()?.init();
    sfx()?.playSelect();
    setCefrLevel(level);
    setPlayerHP(maxHP);
    setMana(3); setXP(0); setStreak(0); setRoomNumber(1);
    setUsedQuestions([]);
    startBattleWithLevel(level, false);
  };

  // ========== RENDER ==========
  if (screen === 'loading') {
    return (
      <div className="min-h-screen bg-gradient-to-b from-slate-900 via-purple-950 to-slate-900 flex items-center justify-center">
        <div className="text-center">
          <div className="text-6xl mb-4" style={{ animation: 'spin 2s linear infinite' }}>⚔</div>
          <p className="font-title text-yellow-400 text-2xl">Loading your quest...</p>
        </div>
      </div>
    );
  }

  if (screen === 'menu') {
    const levels = ['A1','A2','B1','B2','C1'];
    const highestIdx = levels.indexOf(highestLevel);
    const levelConfigs = [
      { level: 'A1', desc: 'Beginner — Basic synonyms & antonyms', color: 'from-green-600 to-green-700' },
      { level: 'A2', desc: 'Elementary — Common words, simple concepts', color: 'from-teal-600 to-teal-700' },
      { level: 'B1', desc: 'Intermediate — Phrasal verbs, context', color: 'from-blue-600 to-blue-700' },
      { level: 'B2', desc: 'Upper — Nuance, collocations', color: 'from-purple-600 to-purple-700' },
      { level: 'C1', desc: 'Advanced — Idioms, sophisticated vocab', color: 'from-red-600 to-red-700' },
    ];

    return (
      <div className="min-h-screen bg-gradient-to-b from-slate-900 via-purple-950 to-slate-900 p-4 flex items-center justify-center font-body">
        <div className="max-w-2xl w-full">
          {saveNotice && (
            <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-emerald-700 border-2 border-emerald-400 text-white font-bold px-4 py-2 rounded-lg z-50 animate-pulse">{saveNotice}</div>
          )}
          <div className="text-center mb-6">
            <div className="inline-block mb-4 animate-bounce text-7xl">⚔</div>
            <h1 className="font-title text-6xl font-black text-yellow-400 mb-3 tracking-wider" style={{ textShadow: '4px 4px 0 #000, 0 0 30px rgba(234,179,8,0.5)' }}>LEXICON QUEST</h1>
            <p className="font-pixel text-purple-300 text-sm tracking-widest">⚔ THE SYNONYM DUNGEON ⚔</p>
          </div>
          {(totalLifetimeXP > 0 || spellJournal.length > 0) && (
            <div className="bg-gradient-to-r from-indigo-900/80 to-purple-900/80 border-2 border-indigo-500 rounded-lg p-3 mb-4">
              <div className="grid grid-cols-3 gap-2 text-center text-white">
                <div><div className="font-pixel text-xs text-indigo-300 mb-1">LIFETIME</div><div className="font-title text-2xl font-bold text-yellow-400">{totalLifetimeXP}</div><div className="text-xs text-slate-400">XP</div></div>
                <div><div className="font-pixel text-xs text-indigo-300 mb-1">MASTERED</div><div className="font-title text-2xl font-bold text-green-400">{spellJournal.length}</div><div className="text-xs text-slate-400">words</div></div>
                <div><div className="font-pixel text-xs text-indigo-300 mb-1">HIGHEST</div><div className="font-title text-2xl font-bold text-pink-400">{highestLevel}</div><div className="text-xs text-slate-400">reached</div></div>
              </div>
            </div>
          )}
          {hasSave && (
            <button onClick={resumeGame} className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:brightness-125 border-4 border-emerald-300 rounded-lg p-4 mb-4 text-white font-pixel text-base animate-pulse">▶ CONTINUE QUEST</button>
          )}
          <div className="bg-slate-800/80 backdrop-blur border-4 border-yellow-600 rounded-lg p-6 mb-4" style={{ boxShadow: '0 0 30px rgba(234,179,8,0.3)' }}>
            <h2 className="font-title text-yellow-400 text-2xl font-bold mb-4">📖 {hasSave ? 'NEW QUEST' : 'CHOOSE YOUR DIFFICULTY'}</h2>
            <div className="space-y-3">
              {levelConfigs.map(({level, desc, color}, idx) => {
                const isCleared = idx <= highestIdx && highestIdx > 0;
                const isHighest = level === highestLevel && highestIdx > 0;
                return (
                  <button key={level} onClick={() => startGame(level)} className={`w-full bg-gradient-to-r ${color} hover:brightness-125 border-2 ${isHighest ? 'border-yellow-300' : 'border-yellow-500'} rounded-lg p-4 flex items-center justify-between text-white transition-all hover:scale-[1.02]`}>
                    <div className="text-left flex items-center gap-4">
                      <span className="font-pixel text-xl">{level}</span>
                      <span className="text-base font-medium opacity-95">{desc}</span>
                    </div>
                    <div className="flex items-center gap-2">
                      {isCleared && <span className="text-yellow-300 text-xl">⭐</span>}
                      <span className="text-2xl">›</span>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3 mb-3">
            {spellJournal.length > 0 && (
              <button onClick={() => { sfx()?.playClick(); setScreen('journal'); }} className="bg-indigo-700 hover:bg-indigo-600 border-2 border-indigo-400 rounded-lg p-3 text-white font-bold text-base flex items-center justify-center gap-2">📖 Journal ({spellJournal.length})</button>
            )}
            {(totalLifetimeXP > 0 || hasSave || spellJournal.length > 0) && (
              <button onClick={() => { if (window.confirm('Reset all progress? This will delete your spell journal, lifetime XP, and any saved quest. This cannot be undone.')) resetAllProgress(); }} className={`bg-red-900/60 hover:bg-red-800 border-2 border-red-700 rounded-lg p-3 text-red-200 font-bold text-base flex items-center justify-center gap-2 ${spellJournal.length === 0 ? 'col-span-2' : ''}`}>↻ Reset Progress</button>
            )}
          </div>
          <div className="text-center text-purple-400 text-sm">Answer fast for critical hits · Wrong answers take damage · Collect words to master the dungeon</div>
          <div className="text-center mt-2 text-purple-500 text-sm flex items-center justify-center gap-3">
            <span>🔊 Sound on</span><span>·</span><span>💾 Auto-save enabled</span>
          </div>
        </div>
      </div>
    );
  }

  if (screen === 'journal') {
    return (
      <div className="min-h-screen bg-gradient-to-b from-slate-900 via-indigo-950 to-slate-900 p-4 font-body">
        <div className="max-w-2xl mx-auto">
          <div className="flex items-center justify-between mb-6">
            <h1 className="font-title text-4xl font-black text-yellow-400" style={{ textShadow: '2px 2px 0 #000' }}>📖 SPELL JOURNAL</h1>
            <button onClick={() => setScreen('menu')} className="bg-slate-700 hover:bg-slate-600 border-2 border-slate-500 px-4 py-2 rounded text-white font-bold">← BACK</button>
          </div>
          <div className="space-y-3">
            {spellJournal.map((entry, i) => {
              const ts = TYPE_STYLES[entry.type] || TYPE_STYLES.synonym;
              return (
                <div key={i} className="bg-slate-800 border-2 border-indigo-600 rounded-lg p-4 text-white">
                  <div className="flex items-center gap-2 mb-2 flex-wrap">
                    <span className="text-yellow-400">✨</span>
                    <span className="font-title font-bold text-2xl text-yellow-300">{entry.word}</span>
                    <span className="font-pixel text-xs bg-purple-700 px-2 py-1 rounded">{entry.level}</span>
                    <span className="font-pixel text-xs px-2 py-1 rounded" style={{ backgroundColor: ts.bg, color: ts.color, border: `1px solid ${ts.border}` }}>{ts.label}</span>
                  </div>
                  <div className="text-slate-200 text-base">→ <span className="font-bold" style={{ color: ts.color }}>{entry.answer}</span></div>
                  <div className="text-slate-400 text-sm italic mt-1">{entry.hint}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  if (screen === 'victory') {
    return (
      <div className="min-h-screen bg-gradient-to-b from-green-950 via-emerald-900 to-slate-900 p-4 flex items-center justify-center font-body">
        <div className="max-w-md w-full text-center">
          <div className="text-8xl mb-4 animate-bounce">🏆</div>
          <h1 className="font-title text-5xl font-black text-yellow-400 mb-4" style={{ textShadow: '4px 4px 0 #000' }}>VICTORY!</h1>
          <p className="text-green-300 text-xl mb-2 font-semibold">You defeated the {currentMonster.name}!</p>
          <div className="bg-slate-800/80 border-4 border-green-600 rounded-lg p-6 my-6">
            <div className="text-white space-y-3 text-lg">
              <div className="flex justify-between"><span>+XP</span><span className="text-yellow-400 font-bold">+25</span></div>
              <div className="flex justify-between"><span>+HP</span><span className="text-red-400 font-bold">+2</span></div>
              <div className="flex justify-between"><span>+Mana</span><span className="text-blue-400 font-bold">+1</span></div>
              <div className="flex justify-between border-t border-slate-600 pt-3"><span>Total XP</span><span className="text-yellow-400 font-bold">{xp}</span></div>
              <div className="flex justify-between"><span>Room</span><span className="text-purple-300 font-bold">{roomNumber}/{ROOMS_PER_LEVEL}</span></div>
            </div>
          </div>
          <button onClick={continueAdventure} className="w-full bg-gradient-to-r from-green-600 to-emerald-600 hover:brightness-125 border-4 border-green-400 rounded-lg p-4 text-white font-pixel text-base tracking-wider">{roomNumber + 1 > ROOMS_PER_LEVEL ? '⚔ FACE THE BOSS ⚔' : 'CONTINUE →'}</button>
          <button onClick={resetGame} className="mt-3 text-slate-400 hover:text-white text-base underline">Return to menu</button>
        </div>
      </div>
    );
  }

  if (screen === 'levelComplete') {
    return (
      <div className="min-h-screen bg-gradient-to-b from-yellow-900 via-orange-900 to-red-950 p-4 flex items-center justify-center font-body">
        <div className="max-w-md w-full text-center">
          <div className="text-8xl mb-4 animate-pulse">👑</div>
          <h1 className="font-title text-5xl font-black text-yellow-300 mb-3" style={{ textShadow: '4px 4px 0 #000' }}>LEVEL CLEARED!</h1>
          <p className="text-orange-300 text-xl mb-2 font-semibold">The {LEVEL_NAMES[cefrLevel]} is conquered!</p>
          <div className="bg-slate-900/80 border-4 border-yellow-500 rounded-lg p-6 my-6">
            <div className="text-white space-y-3 text-lg">
              <div className="flex justify-between text-xl"><span>BOSS XP</span><span className="text-yellow-400 font-black">+100</span></div>
              <div className="flex justify-between"><span>Total XP</span><span className="text-yellow-400 font-bold">{xp}</span></div>
              <div className="flex justify-between"><span>Words Mastered</span><span className="text-green-400 font-bold">{spellJournal.length}</span></div>
            </div>
          </div>
          {cefrLevel !== 'C1' ? (
            <button onClick={advanceLevel} className="w-full bg-gradient-to-r from-yellow-500 to-orange-600 hover:brightness-125 border-4 border-yellow-300 rounded-lg p-4 text-white font-pixel text-base tracking-wider">ASCEND NEXT LEVEL ⬆</button>
          ) : (
            <button onClick={() => setScreen('gameWon')} className="w-full bg-gradient-to-r from-yellow-500 to-orange-600 hover:brightness-125 border-4 border-yellow-300 rounded-lg p-4 text-white font-pixel text-base tracking-wider">CLAIM YOUR TITLE 👑</button>
          )}
          <button onClick={resetGame} className="mt-3 text-slate-400 hover:text-white text-base underline">Return to menu</button>
        </div>
      </div>
    );
  }

  if (screen === 'gameWon') {
    return (
      <div className="min-h-screen bg-gradient-to-b from-purple-950 via-pink-900 to-yellow-900 p-4 flex items-center justify-center font-body">
        <div className="max-w-md w-full text-center">
          <div className="text-8xl mb-4 animate-bounce">⚔</div>
          <h1 className="font-title text-6xl font-black text-yellow-300 mb-4" style={{ textShadow: '4px 4px 0 #000' }}>LEGEND!</h1>
          <p className="text-pink-200 text-xl mb-6 font-semibold">You have mastered every level of the dungeon!</p>
          <div className="bg-slate-900/80 border-4 border-yellow-400 rounded-lg p-6 my-6">
            <div className="text-white space-y-3">
              <div className="flex justify-between text-2xl"><span>🏆 Final XP</span><span className="text-yellow-400 font-black">{xp}</span></div>
              <div className="flex justify-between text-lg"><span>📚 Vocabulary</span><span className="text-green-400 font-bold">{spellJournal.length} words</span></div>
            </div>
          </div>
          <button onClick={resetGame} className="w-full bg-gradient-to-r from-purple-600 to-pink-600 border-4 border-yellow-300 rounded-lg p-4 text-white font-pixel text-base tracking-wider">NEW ADVENTURE</button>
        </div>
      </div>
    );
  }

  if (screen === 'defeat') {
    return (
      <div className="min-h-screen bg-gradient-to-b from-red-950 via-slate-900 to-black p-4 flex items-center justify-center font-body">
        <div className="max-w-md w-full text-center">
          <div className="text-8xl mb-4">💀</div>
          <h1 className="font-title text-6xl font-black text-red-500 mb-4" style={{ textShadow: '4px 4px 0 #000' }}>DEFEATED</h1>
          <p className="text-red-300 text-lg mb-6 font-semibold">The dungeon has claimed another soul...</p>
          <div className="bg-slate-800/80 border-4 border-red-600 rounded-lg p-6 my-6">
            <div className="text-white space-y-3 text-lg">
              <div className="flex justify-between"><span>XP Earned</span><span className="text-yellow-400 font-bold">{xp}</span></div>
              <div className="flex justify-between"><span>Rooms Cleared</span><span className="text-purple-300 font-bold">{roomNumber - 1}</span></div>
              <div className="flex justify-between"><span>Words Learned</span><span className="text-green-400 font-bold">{spellJournal.length}</span></div>
            </div>
          </div>
          <button onClick={resetGame} className="w-full bg-red-700 hover:bg-red-600 border-4 border-red-400 rounded-lg p-4 text-white font-pixel text-base tracking-wider">↻ TRY AGAIN</button>
        </div>
      </div>
    );
  }

  // BATTLE SCREEN
  const ts = currentQuestion ? (TYPE_STYLES[currentQuestion.type] || TYPE_STYLES.synonym) : TYPE_STYLES.synonym;
  const getPrompt = () => {
    if (!currentQuestion) return '';
    const map = {
      synonym: 'Find a SYNONYM for:',
      antonym: 'Find an ANTONYM for:',
      context: 'Fill in the blank:',
      phrasal: 'What does this phrasal verb mean?',
      nuance: 'Choose the BEST meaning:',
      collocation: 'Complete the collocation:',
      idiom: 'What does this idiom mean?',
      definition: 'Which word matches?',
      odd: 'Odd one out:',
      category: 'Choose the correct category:',
    };
    return map[currentQuestion.type] || 'Choose the correct answer:';
  };

  return (
    <div className={`min-h-screen bg-gradient-to-b from-slate-900 via-purple-950 to-slate-900 p-3 font-body ${shake ? 'shake' : ''}`}>
      <div className="max-w-2xl mx-auto">
        <div className="bg-slate-800/90 border-2 border-yellow-600 rounded-lg p-3 mb-3">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="font-title text-yellow-400 font-bold text-base">{LEVEL_NAMES[cefrLevel]}</span>
              <span className="font-pixel bg-purple-700 text-white px-2 py-1 rounded text-xs">{cefrLevel}</span>
              <span className="text-slate-300 text-sm font-semibold">Room {roomNumber}/{ROOMS_PER_LEVEL}</span>
            </div>
            <div className="flex items-center gap-2">
              <span className="text-yellow-400">🏆</span>
              <span className="text-yellow-400 font-bold text-base">{xp} XP</span>
              {streak >= 2 && <span className="font-pixel ml-1 bg-orange-600 text-white px-2 py-1 rounded animate-pulse text-xs">🔥 {streak}</span>}
              <button onClick={toggleMute} className="ml-1 bg-slate-700 hover:bg-slate-600 border border-slate-500 rounded p-1.5 text-white text-sm">{muted ? '🔇' : '🔊'}</button>
            </div>
          </div>
          <div className="mt-2">
            <div className="flex items-center justify-between text-sm text-white mb-1 font-semibold"><span>❤️ HP</span><span>{playerHP}/{maxHP}</span></div>
            <div className={`h-4 bg-slate-900 border border-slate-600 rounded overflow-hidden ${damageFlash === 'player' ? 'animate-pulse' : ''}`}>
              <div className={`h-full transition-all duration-500 ${damageFlash === 'player' ? 'bg-red-600' : 'bg-gradient-to-r from-red-600 to-red-400'}`} style={{ width: `${(playerHP/maxHP)*100}%` }} />
            </div>
          </div>
          <div className="mt-2 flex items-center gap-2">
            <span className="text-sm text-white font-semibold">⚡ Hint Potions:</span>
            {[...Array(5)].map((_, i) => <div key={i} className={`w-5 h-5 rounded-full border border-blue-300 ${i < mana ? 'bg-blue-500' : 'bg-slate-700'}`} />)}
          </div>
        </div>

        <div className="bg-gradient-to-b from-slate-800 to-slate-900 border-4 border-purple-700 rounded-lg p-5 mb-3 relative overflow-hidden">
          <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle, rgba(168,85,247,0.3) 1px, transparent 1px)', backgroundSize: '20px 20px' }} />
          <div className="relative text-center">
            {currentMonster?.isBoss && <div className="font-pixel inline-block bg-red-700 text-white px-3 py-1.5 rounded text-xs font-bold mb-2 animate-pulse">⚠ BOSS BATTLE ⚠</div>}
            <div className={`text-8xl mb-2 inline-block transition-transform ${playerAttack ? 'scale-75 -translate-x-4' : ''} ${damageFlash === 'monster' ? 'animate-bounce' : ''} ${monsterAttack ? 'scale-110' : ''}`}>{currentMonster?.emoji}</div>
            <h2 className="font-title text-white font-bold text-2xl mb-2">{currentMonster?.name}</h2>
            <div className="max-w-xs mx-auto">
              <div className="flex justify-between text-sm text-white mb-1 font-semibold"><span>💀 HP</span><span>{currentMonster?.currentHP}/{currentMonster?.hp}</span></div>
              <div className="h-4 bg-slate-900 border border-slate-600 rounded overflow-hidden">
                <div className="h-full bg-gradient-to-r from-green-500 to-yellow-500 transition-all duration-500" style={{ width: `${(currentMonster?.currentHP/currentMonster?.hp)*100}%` }} />
              </div>
            </div>
            {criticalHit && feedback === 'correct' && <div className="font-pixel absolute top-4 right-4 text-yellow-300 font-black text-xl animate-ping">CRIT!</div>}
          </div>
        </div>

        <div className="bg-slate-800 border-2 rounded-lg p-4" style={{ borderColor: ts.border, boxShadow: `0 0 20px ${ts.bg}` }}>
          <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
            <div className="flex items-center gap-2">
              <span className="font-pixel text-xs px-3 py-1.5 rounded-md font-bold" style={{ backgroundColor: ts.bg, color: ts.color, border: `2px solid ${ts.border}`, textShadow: `0 0 8px ${ts.color}` }}>{ts.label}</span>
              <span className="text-slate-300 text-sm font-semibold">{getPrompt()}</span>
            </div>
            <div className="flex items-center gap-2">
              <div className={`font-pixel text-sm font-bold ${timeLeft <= 5 ? 'text-red-400 animate-pulse' : 'text-green-400'}`}>⏱ {timeLeft}s</div>
              <button onClick={useHintPotion} disabled={mana === 0 || showHint || feedback} className="bg-blue-700 hover:bg-blue-600 disabled:bg-slate-700 disabled:opacity-50 border border-blue-400 rounded px-3 py-1.5 text-sm text-white font-bold">⚡ Hint</button>
            </div>
          </div>
          <div className="bg-slate-900 border-2 rounded-lg p-5 mb-4 text-center" style={{ borderColor: ts.border }}>
            {currentQuestion?.prompt ? (
              <div className="text-white text-lg font-semibold leading-relaxed">{currentQuestion.prompt}</div>
            ) : currentQuestion?.context ? (
              <div className="text-white text-xl leading-relaxed">
                {currentQuestion.context.split('___').map((part, i, arr) => (
                  <span key={i}>{part}{i < arr.length - 1 && <span className="font-title inline-block bg-purple-900 border-b-4 px-6 mx-1 rounded text-yellow-300 font-bold" style={{ borderColor: ts.border }}>___</span>}</span>
                ))}
              </div>
            ) : (
              <div className="font-title text-5xl font-black tracking-wide py-2" style={{ color: ts.color, textShadow: `3px 3px 0 #000, 0 0 20px ${ts.color}` }}>"{currentQuestion?.word}"</div>
            )}
            {showHint && <div className="mt-3 text-blue-300 text-base italic">✨ {currentQuestion?.hint}</div>}
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {currentQuestion?.options.map((opt, i) => {
              const isSelected = selectedOption === i;
              const isCorrect = i === currentQuestion.answer;
              let bg = 'bg-slate-700 hover:bg-slate-600 border-slate-500 hover:border-yellow-500';
              if (feedback) {
                if (isCorrect) bg = 'bg-green-700 border-green-400';
                else if (isSelected) bg = 'bg-red-700 border-red-400';
                else bg = 'bg-slate-800 border-slate-700 opacity-50';
              }
              return (
                <button key={i} onClick={() => handleAnswer(i)} disabled={feedback !== null} className={`${bg} border-2 rounded-lg p-4 text-white font-bold text-lg transition-all hover:scale-[1.02] disabled:cursor-not-allowed text-left flex items-center gap-3`}>
                  <span className="font-pixel bg-black/40 w-8 h-8 rounded flex items-center justify-center text-xs shrink-0">{String.fromCharCode(65 + i)}</span>
                  <span className="flex-1">{opt}</span>
                </button>
              );
            })}
          </div>
          {feedback === 'correct' && <div className="font-pixel mt-3 text-center text-green-400 font-bold text-base animate-pulse">⚔ HIT! {criticalHit && '🔥 CRITICAL!'} ⚔</div>}
          {feedback === 'wrong' && <div className="mt-3 text-center text-red-400 font-bold text-base">💥 The {currentMonster?.name} strikes back!</div>}
        </div>
        <button onClick={resetGame} className="mt-3 text-slate-500 hover:text-slate-300 text-sm w-full text-center">Flee dungeon →</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LexiconQuest />);
</script>
</body>
</html>
